<div style="font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto;">
  <h2>HTML5 Native Range Sliders</h2>
  
  <div style="margin-bottom: 25px;">
    <label for="volumeSlider">Volume Level (0 to 100):</label><br>
    <input type="range" id="volumeSlider" min="0" max="100" value="50" step="5" style="width: 100%;">
    <p>Current Volume: <span id="volumeValue">50</span>%</p>
  </div>

  <div style="margin-bottom: 25px;">
    <label for="brightnessSlider">Screen Brightness (0 to 10):</label><br>
    <input type="range" id="brightnessSlider" min="0" max="10" value="3" step="1" style="width: 100%;">
    <p>Brightness Level: <span id="brightnessValue">3</span></p>
  </div>
</div>
