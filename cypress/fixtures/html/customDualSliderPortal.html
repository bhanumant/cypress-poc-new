<div style="font-family: sans-serif; padding: 20px; max-width: 550px; margin: auto;">
  <h2>Custom UI Dual-Handle Price Range Slider</h2>
  
  <div class="slider-container" style="position: relative; width: 100%; height: 50px; margin: 30px 0;">
    <div id="sliderTrack" style="position: absolute; top: 20px; width: 100%; height: 8px; background: #ddd; border-radius: 4px;"></div>
    
    <div id="minHandle" class="slider-handle" role="slider" aria-valuemin="0" aria-valuemax="1000" aria-valuenow="100" tabindex="0" style="position: absolute; top: 12px; left: 10%; width: 24px; height: 24px; background: #007bff; border-radius: 50%; cursor: pointer;"></div>
    
    <div id="maxHandle" class="slider-handle" role="slider" aria-valuemin="0" aria-valuemax="1000" aria-valuenow="800" tabindex="0" style="position: absolute; top: 12px; left: 80%; width: 24px; height: 24px; background: #28a745; border-radius: 50%; cursor: pointer;"></div>
  </div>

  <p style="font-size: 16px; font-weight: bold;">Selected Price Range: $<span id="minPrice">100</span> - $<span id="maxPrice">800</span></p>
</div>
