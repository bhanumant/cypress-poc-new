<div style="font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto;">
  <h2>Secure Portal Login</h2>
  <form id="loginForm">
    <div style="margin-bottom:12px;">
      <label>Username:</label><br>
      <input type="text" name="username" id="username" placeholder="Username" style="width:100%; padding:8px;">
    </div>
    <div style="margin-bottom:12px;">
      <label>Password:</label><br>
      <input type="password" name="password" id="password" placeholder="Password" style="width:100%; padding:8px;">
    </div>
    <button type="button" id="loginBtn" style="padding:10px 20px; background:#007bff; color:#fff; border:none; border-radius:4px; width:100%;">Login</button>
  </form>
  <div id="loginStatus" class="oxd-alert-content-text" style="margin-top:15px; font-weight:bold;"></div>
  <div id="userDashboard" class="oxd-userdropdown-name" style="display:none; margin-top:15px; color:green; font-weight:bold;">Welcome, Admin!</div>
</div>
