<div style="font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto;">
  <h2>Browser Cookie Management Portal</h2>
  
  <div style="margin-bottom: 20px;">
    <input type="text" id="cookieName" placeholder="Cookie Name" style="padding: 6px;">
    <input type="text" id="cookieValue" placeholder="Cookie Value" style="padding: 6px;">
    <button type="button" id="setCookieBtn" style="padding: 6px 12px; background: #17a2b8; color: white; border: none; border-radius: 4px;">Set Cookie</button>
    <button type="button" id="clearCookieBtn" style="padding: 6px 12px; background: #dc3545; color: white; border: none; border-radius: 4px;">Clear Cookies</button>
  </div>

  <div>
    <h3>Active Cookies Display:</h3>
    <pre id="cookieOutput" style="background: #f8f9fa; padding: 10px; border: 1px solid #ccc; font-family: monospace;">No cookies present</pre>
  </div>
</div>
